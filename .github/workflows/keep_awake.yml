name: Keep VendorIQ Awake

on:
  schedule:
    # Runs every 25 minutes — Streamlit sleeps after 30 mins of inactivity
    - cron: '*/25 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping VendorIQ Streamlit App
        run: |
          echo "Pinging VendorIQ at $(date)..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            "https://smart-vendor-proposal-comparison-from-emails-wwedl3ecdlh3wpepp.streamlit.app")

          echo "HTTP Response: $RESPONSE"

          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 302 ]; then
            echo "✅ App is awake and responding."
          else
            echo "⚠️ App returned status $RESPONSE — it may be waking up."
          fi